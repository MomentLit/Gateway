server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: Gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/auth/**

            - id: user-service
              uri: ${USER_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/users/**

            - id: space-service
              uri: ${SPACE_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/spaces/**

            - id: matching-service
              uri: ${MATCHING_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/matchings/**
